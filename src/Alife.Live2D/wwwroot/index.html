<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Live2D Desktop Pet</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }

        #canvas {
            width: 100%;
            height: 100%;
            cursor: move;
        }

        #bubble {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            padding: 12px 18px;
            font-family: 'Inter', 'Segoe UI', 'Microsoft YaHei', sans-serif;
            font-size: 14px;
            color: #1a1a1a;
            max-width: 80%;
            display: none;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            z-index: 100;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        #bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid rgba(255, 255, 255, 0.9);
        }

        #thinking {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 40px;
            height: 40px;
            display: none;
            z-index: 90;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #ffcc00;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both;
            margin-right: 4px;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>
<body>
    <div id="bubble"></div>
    <div id="thinking">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>
    <canvas id="canvas"></canvas>

    <script src="lib/live2dcubismcore.min.js"></script>
    <script src="lib/live2d.min.js"></script>
    <script src="lib/pixi.min.js"></script>
    <script src="lib/pixi-live2d-display.min.js"></script>

    <script>
        let currentModel = null;
        let app = null;

        async function init() {
            try {
                const { Application, Ticker } = PIXI;
                const { Live2DModel } = PIXI.live2d;

                Live2DModel.registerTicker(Ticker.shared);

                app = new Application({
                    view: document.getElementById('canvas'),
                    autoStart: true,
                    backgroundAlpha: 0,
                    resizeTo: window,
                    antialias: true
                });

                await switchModel('hiyori');

                // --- 实现鼠标拖拽窗口 ---
                let isDragging = false;
                window.addEventListener('mousedown', (e) => {
                    if (e.button === 0) { // 左键
                        isDragging = true;
                        if (window.chrome && window.chrome.webview) {
                            window.chrome.webview.postMessage("drag");
                        }
                    }
                });

                window.pet = {
                    say: function(text, duration = 3000) {
                        const bubble = document.getElementById('bubble');
                        bubble.innerText = text;
                        bubble.style.display = 'block';
                        bubble.style.opacity = '1';
                        if (this._bubbleTimer) clearTimeout(this._bubbleTimer);
                        this._bubbleTimer = setTimeout(() => {
                            bubble.style.opacity = '0';
                            setTimeout(() => { bubble.style.display = 'none'; }, 300);
                        }, duration);
                        
                        if (currentModel) currentModel.motion('Idle');
                    },
                    action: function(motionName) {
                        if (!currentModel) return;
                        const mapping = {
                            'tap_body': 'TapBody',
                            'idle': 'Idle',
                            'happy': 'TapBody'
                        };
                        const target = mapping[motionName.toLowerCase()] || motionName;
                        currentModel.motion(target);
                    },
                    switch: async function(name) {
                        await switchModel(name);
                    },
                    setThinking: function(isThinking) {
                        const thinking = document.getElementById('thinking');
                        thinking.style.display = isThinking ? 'block' : 'none';
                    }
                };

                window.pet.say("准备就绪！", 4000);

            } catch (e) {
                console.error("Live2D Error: ", e);
            }
        }

        async function switchModel(name) {
            const { Live2DModel } = PIXI.live2d;
            
            if (currentModel) {
                app.stage.removeChild(currentModel);
                currentModel.destroy();
            }

            const modelSettings = {
                'hiyori': { path: 'model/hiyori/model.json', scale: 0.08, yOffset: 0.5 },
                'shizuku': { path: 'model/shizuku/shizuku.model.json', scale: 0.3, yOffset: 0.6 }
            };

            const settings = modelSettings[name.toLowerCase()] || modelSettings['hiyori'];

            try {
                currentModel = await Live2DModel.from(settings.path, {
                    autoInteract: true
                });

                app.stage.addChild(currentModel);
                
                currentModel.anchor.set(0.5, 0.5);
                currentModel.position.set(app.screen.width / 2, app.screen.height * settings.yOffset);
                currentModel.scale.set(settings.scale);

                currentModel.interactive = true;
                currentModel.on('hit', (hitAreas) => {
                    if (hitAreas.includes('Body')) {
                        currentModel.motion('TapBody');
                    }
                });
            } catch (err) {
                console.error("Failed to load model:", name, err);
            }
        }

        init();
    </script>
</body>
</html>
