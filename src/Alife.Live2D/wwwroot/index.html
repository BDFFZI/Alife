<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Live2D Desktop Pet</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }

        #canvas {
            width: 100vw;
            height: 100vh;
            display: block;
            cursor: move;
            /* Debug: background color to see canvas area */
            background: rgba(255, 0, 0, 0.2); 
        }

        #bubble {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            padding: 12px 18px;
            font-family: 'Inter', 'Segoe UI', 'Microsoft YaHei', sans-serif;
            font-size: 14px;
            color: #1a1a1a;
            max-width: 80%;
            display: none;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            z-index: 100;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        #bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid rgba(255, 255, 255, 0.9);
        }

        #thinking {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 40px;
            height: 40px;
            display: none;
            z-index: 90;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #ffcc00;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both;
            margin-right: 4px;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>
<body>
    <div id="bubble"></div>
    <div id="thinking">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>
    <canvas id="canvas"></canvas>

    <!-- Core Live2D Libraries (No PIXI) -->
    <script src="lib/live2dcubismcore.min.js" onload="console.log('Lib loaded: core')" onerror="console.error('Lib failed: core')"></script>
    <script src="lib/live2d.min.js" onload="console.log('Lib loaded: v2')" onerror="console.error('Lib failed: v2')"></script>
    <script src="lib/live2d_bundle.js" onload="console.log('Lib loaded: bundle')" onerror="console.error('Lib failed: bundle')"></script>

    <script>
        /**
         * Standalone Live2D Renderer Implementation
         * Powered by live2d_bundle.js (No PIXI)
         */

        // --- 1. Structured Logging Setup ---
        function sendToHost(type, message) {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage({ type: type, message: message });
            }
        }
        console.log = m => sendToHost('log', typeof m === 'object' ? JSON.stringify(m) : String(m));
        console.error = m => sendToHost('error', typeof m === 'object' ? JSON.stringify(m) : String(m));
        console.warn = m => sendToHost('warn', typeof m === 'object' ? JSON.stringify(m) : String(m));

        const bubble = document.getElementById('bubble');
        const showStatus = (text, persist = false) => {
            if (!bubble) return;
            bubble.innerText = text;
            bubble.style.display = 'block';
            bubble.style.opacity = '1';
            if (!persist) {
                setTimeout(() => {
                    bubble.style.opacity = '0';
                    setTimeout(() => { bubble.style.display = 'none'; }, 300);
                }, 4000);
            }
        };

        window.onerror = (m, s, l) => {
            console.error(`${m} at ${s}:${l}`);
            showStatus("运行错误: " + m, true);
        };

        // --- 2. Live2D Integration logic ---
        async function init() {
            showStatus("正在初始化引擎 (No PIXI)...", true);
            console.log("JS: Initialization started.");

            const canvas = document.getElementById('canvas');
            const resize = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                console.log(`Canvas resized: ${canvas.width}x${canvas.height}`);
            };
            window.addEventListener('resize', resize);
            resize();

            // Global pet object for host commands
            window.pet = {
                say: (text) => showStatus(text),
                switch: (name) => switchModel(name),
                action: (name) => {
                    console.log("Action triggered:", name);
                },
                setThinking: (state) => {
                    const el = document.getElementById('thinking');
                    if (el) el.style.display = state ? 'block' : 'none';
                }
            };

            await switchModel('shizuku');
        }

        async function switchModel(name) {
            console.log("Loading model: " + name);
            showStatus(`正在加载 ${name}...`, true);

            const modelMap = {
                'hiyori': 'model/hiyori/hiyori.model3.json',
                'shizuku': 'model/shizuku/shizuku.model.json'
            };

            let path = modelMap[name.toLowerCase()] || modelMap['hiyori'];
            const absUrl = new URL(path, window.location.href).href;
            console.log("Fetching: " + absUrl);
            
            try {
                // Baseline test
                const baseTest = await fetch('index.html');
                console.log(`Self-fetch (index.html): ${baseTest.ok ? 'OK' : 'FAIL ' + baseTest.status}`);

                const response = await fetch(absUrl);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                console.log(`Resource reachable: ${absUrl}`);
            } catch (err) {
                console.error("Network Error: " + err.message + " for " + absUrl);
            }

            try {
                if (name.toLowerCase() === 'hiyori' || path.endsWith('.model3.json')) {
                    if (typeof live2dv4 !== 'undefined') {
                        console.log("Calling live2dv4.load...");
                        live2dv4.load("canvas", path);
                    } else {
                        throw new Error("live2dv4 missing");
                    }
                } else {
                    if (typeof live2dv2 !== 'undefined') {
                        console.log("Calling live2dv2.load...");
                        live2dv2.load("canvas", path);
                    } else {
                        throw new Error("live2dv2 missing");
                    }
                }
                setTimeout(() => showStatus("已发送加载指令"), 1000);
            } catch (e) {
                console.error("Renderer Error: " + e.message);
                showStatus("加载失败: " + e.message, true);
            }
        }

        init();
    </script>
</body>
</html>
